<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GarageSpot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efea;height:100%;overflow:hidden}
.page{display:flex;flex-direction:column;height:100dvh;padding:7px;gap:5px}

/* ── TOPBAR UNIFICADA ── */
.topbar{background:#fff;border:1px solid #ccc;border-radius:9px;padding:6px 12px;flex-shrink:0;display:flex;align-items:center;gap:0}
/* Bloco nome */
.tb-name{flex-shrink:0;padding-right:12px;border-right:1px solid #e0e0da}
.an{font-size:14px;font-weight:700;color:#111;line-height:1.2}
.as-dev{font-size:8px;color:#bbb;line-height:1.2}
/* Bloco stats vagas */
.tb-stats{display:flex;gap:0;flex-shrink:0;padding:0 12px;border-right:1px solid #e0e0da}
.tb-stat{text-align:center;padding:0 8px;border-right:1px solid #eee}
.tb-stat:last-child{border-right:none}
.tb-val{font-size:16px;font-weight:700;line-height:1.2}
.tb-lbl{font-size:8px;color:#888;line-height:1.2;white-space:nowrap}
.tv-total{color:#111}
.tv-free{color:#0F6E56}
.tv-occ{color:#185FA5}
.tv-out{color:#854F0B}
/* Bloco overbooking */
.tb-ob{display:flex;gap:0;flex-shrink:0;padding:0 12px;border-right:1px solid #e0e0da}
.tb-ob-lbl{font-size:8px;color:#A32D2D;font-weight:600;margin-bottom:2px;white-space:nowrap}
/* Relógio + toggle passeio */
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.clk{font-size:10px;color:#888}
.pt-arrow{font-size:10px;color:#888;cursor:pointer;user-select:none;padding:4px 6px;border-radius:5px;border:1px solid #e0e0da;background:#f5f4f0;line-height:1}
.pt-arrow:active{background:#e0e0da}

/* ── PAINEL PASSEIO SLIM ── */
.panel-body{overflow:hidden;flex-shrink:0}
.panel-body.open{max-height:80px}
.panel-body.closed{max-height:0;pointer-events:none}
.ocard{background:#fff;border:1px solid #e8c97a;border-radius:7px;padding:4px 10px;display:flex;align-items:center;gap:7px;overflow:hidden}
.och{display:flex;align-items:center;gap:5px;flex-shrink:0}
.oct{font-size:10px;font-weight:700;color:#633806;white-space:nowrap}
.ocb{background:#FAEEDA;color:#633806;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;min-width:16px;text-align:center}
.olist-h{display:flex;gap:5px;overflow-x:auto;flex:1;min-width:0;align-items:center;padding:2px 0}
.olist-h::-webkit-scrollbar{height:2px}
.olist-h::-webkit-scrollbar-thumb{background:#BA7517;border-radius:2px}
.oe{font-size:10px;color:#bbb;white-space:nowrap}
.oi{background:#FAEEDA;border-radius:5px;padding:3px 8px;flex-shrink:0;border:1px solid #e8c97a;cursor:pointer;display:flex;flex-direction:column;justify-content:center;gap:1px}
.oi:active{filter:brightness(.93)}
.oa{font-size:11px;font-weight:700;color:#633806;white-space:nowrap}
.oin{font-size:9px;color:#854F0B;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}

/* PAINEL RETRÁTIL */
.pt-left{display:flex;align-items:center;gap:8px}
.pt-arrow{font-size:11px;color:#888;transition:transform .25s;display:inline-block}
.pt-arrow.open{transform:rotate(180deg)}
.panel-body{overflow:hidden;flex-shrink:0}
.panel-body.open{max-height:200px;opacity:1}
.panel-body.closed{max-height:0;opacity:0;pointer-events:none}
.garage-wrap{flex:1;min-height:0;display:flex}
.garage-inner{background:#fff;border:1px solid #ccc;border-radius:9px;padding:6px;width:100%;display:flex;flex-direction:column;min-height:0;gap:4px}

/* A tabela ocupa 100% width e height do container — sem escala, sem transform */
.map-container{flex:1;min-height:0;display:flex;position:relative}
.map-rel{position:relative;width:100%;height:100%;display:flex}

#gtable{
  width:100%;
  height:100%;
  border-collapse:collapse;
  table-layout:fixed;
}
#gtable td{
  border:1.5px solid #999;
  text-align:center;
  vertical-align:middle;
  padding:1px;
  overflow:hidden;
  word-break:break-word;
}

/* estados */
.vv{background:#fff;cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.vv:active{filter:brightness(.88)}
.occ{background:#BDD7EE !important;border-color:#378ADD !important}        /* azul — padrão */
.occ-d{background:#BDD7EE !important;border-color:#378ADD !important}     /* azul — 1D-5D */
.ob-occ{background:#FCEBEB !important;border-color:#E24B4A !important}    /* vermelho — 6D-9D + corredores */
.dup-occ{background:#FFE0B2 !important;border-color:#E65100 !important}   /* laranja — duplicidade */
.blk{background:#D9D9D9;cursor:default}
.corr{background:#D9D9D9;cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.corr:active{filter:brightness(.85)}
.corr.ob-occ{background:#FCEBEB !important;border-color:#E24B4A !important}
.sep{background:#f0efea !important;border:none !important;padding:0 !important}
.hotel{background:#D9D9D9;cursor:default}
.apt-lbl{font-weight:700;color:#0C447C;display:block;line-height:1.2;font-size:1.4vw}
.apt-lbl.ob{color:#A32D2D}
.apt-lbl.dup{color:#BF360C}
.id-lbl{color:#ccc;display:block;line-height:1;font-size:.7vw}

.leg{display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0}
.li{display:flex;align-items:center;gap:3px;font-size:8px;color:#777}
.ls{width:10px;height:10px;border-radius:2px;flex-shrink:0;border:1px solid #aaa}

/* ANEXOS */
.attach-btn{background:none;border:none;cursor:pointer;padding:2px 4px;color:#888;font-size:18px;line-height:1;flex-shrink:0;margin-left:auto}
.attach-btn:active{color:#185FA5}
.share-btn{background:none;border:none;cursor:pointer;padding:2px 4px;color:#888;line-height:1;display:flex;align-items:center;flex-shrink:0}
.share-btn:active{color:#0F6E56}
.share-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}
.attach-area{margin-top:8px;border-top:1px solid #f0efea;padding-top:8px}
.attach-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.attach-label{font-size:10px;color:#888;font-weight:600}
.attach-actions{display:flex;gap:5px}
.attach-act{background:none;border:1px solid #ddd;border-radius:5px;padding:3px 8px;font-size:10px;color:#555;cursor:pointer;font-family:inherit}
.attach-act:active{background:#f5f5f5}
.attach-grid{display:flex;flex-wrap:wrap;gap:5px}
.attach-thumb{position:relative;width:56px;height:56px;border-radius:6px;overflow:hidden;border:1px solid #ddd;flex-shrink:0;cursor:pointer}
.attach-thumb img{width:100%;height:100%;object-fit:cover}
.attach-thumb .del-att{position:absolute;top:1px;right:1px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;line-height:16px;text-align:center;cursor:pointer;padding:0}
.attach-doc{display:flex;align-items:center;gap:5px;background:#f5f4f0;border-radius:5px;padding:4px 7px;font-size:10px;color:#444;cursor:pointer;max-width:140px}
.attach-doc span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.attach-empty{font-size:10px;color:#bbb;font-style:italic}
/* MERGE HORIZONTAL (4B-7B) — vaga coberta some */
.hmerge-hidden{display:none !important}
.drag-src{
  opacity:0.55;
  outline:3px solid #E65100 !important;
  outline-offset:-2px;
  cursor:grabbing !important;
  transition:opacity .15s;
}
.drag-over{
  outline:2.5px dashed #378ADD !important;
  outline-offset:-2px;
  background:#E3F2FD !important;
  transition:background .1s;
}
.drag-ghost{
  position:fixed;pointer-events:none;z-index:600;
  background:#fff;border:2px solid #E65100;border-radius:8px;
  padding:5px 10px;font-size:12px;font-weight:700;color:#E65100;
  box-shadow:0 4px 16px rgba(0,0,0,.22);
  white-space:nowrap;
  transform:translate(-50%,-50%);
  transition:none;
}
.move-banner{background:#FFF3E0;border:1px solid #E65100;border-radius:7px;padding:5px 10px;font-size:11px;color:#BF360C;text-align:center;flex-shrink:0;display:none}
.move-banner.on{display:block}
.map-rel{position:relative;width:100%;height:100%;display:flex}
.pilar{position:absolute;background:#888780;border-radius:3px;pointer-events:none;z-index:2}

/* Lista passeio inline na topbar */
.tb-passeio{display:flex;align-items:center;gap:5px;flex:1;min-width:0;overflow:hidden;padding:0 8px;border-left:1px solid #e0e0da}
.tb-passeio-items{display:flex;gap:4px;overflow:hidden;flex:1;min-width:0;align-items:center}
.tb-pi{background:#FAEEDA;border:1px solid #e8c97a;border-radius:5px;padding:2px 7px;white-space:nowrap;font-size:11px;font-weight:700;color:#633806;cursor:pointer;flex-shrink:0}
.tb-pi:active{filter:brightness(.93)}
.tb-more{background:none;border:none;color:#BA7517;font-size:13px;font-weight:700;cursor:pointer;padding:2px 4px;flex-shrink:0;font-family:inherit;line-height:1}
.tb-more:active{color:#633806}
.tb-out-lbl{font-size:9px;color:#854F0B;white-space:nowrap;flex-shrink:0}
/* Botões reset no painel */
.reset-btns{display:flex;flex-direction:column;gap:3px;flex-shrink:0;padding-left:7px;margin-left:2px}
.rbtn{background:none;border:1px solid #e0ddd8;border-radius:4px;font-size:12px;color:#ccc;cursor:pointer;padding:2px 6px;font-family:inherit;line-height:1.4;transition:border-color .15s,color .15s;font-weight:600}
.rbtn:hover{border-color:#E24B4A;color:#E24B4A}
.rbtn.restore{border-color:#c5d8f0 !important;color:#378ADD !important;font-size:13px}
.rbtn.restore:hover{background:#EEF6FF;color:#185FA5 !important}

@media(orientation:portrait){
  .top-strip{flex-direction:column}
  .apt-lbl{font-size:2.5vw}
  .id-lbl{font-size:1.2vw}
}

/* ── TOOLBAR FERRAMENTAS ── */
.toolbar-tools{background:#fff;border:1px solid #ddd;border-radius:7px;padding:3px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative}
.tb-tools-btn{background:none;border:1px solid #e0ddd8;border-radius:5px;padding:3px 10px;font-size:11px;color:#555;cursor:pointer;font-family:inherit;font-weight:600;line-height:1.6}
.tb-tools-btn:active{background:#f5f4f0}
.tb-dropdown{position:absolute;top:calc(100% + 3px);left:0;background:#fff;border:1px solid #ddd;border-radius:7px;box-shadow:0 4px 16px rgba(0,0,0,.13);z-index:300;min-width:190px;padding:4px 0}
.tb-dd-item{display:block;width:100%;padding:9px 14px;font-size:12px;color:#333;cursor:pointer;text-align:left;border:none;background:none;font-family:inherit;white-space:nowrap}
.tb-dd-item:hover,.tb-dd-item:active{background:#f5f4f0}

/* ── HISTÓRICO CARDS ── */
.hist-card{border-radius:7px;padding:9px 12px;margin:5px 0;color:#fff}
.hist-tipo{font-size:12px;font-weight:700}
.hist-info{font-size:11px;opacity:.88;margin-top:2px}

/* ── USUÁRIOS ── */
.usr-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid #eee;border-radius:7px;margin-bottom:5px;cursor:pointer;background:#fafafa}
.usr-item:active{background:#f0efea}
.usr-nome{font-size:13px;font-weight:700;color:#111}
.usr-cargo-lbl{font-size:11px;color:#888;margin-top:1px}
.usr-badge-out{display:inline-block;background:#FCEBEB;color:#A32D2D;font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:middle}
.usr-list{display:flex;flex-direction:column;max-height:250px;overflow-y:auto;margin:6px 0}

/* ── TOAST ── */
.gs-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(15,110,86,.95);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,.25);white-space:nowrap;pointer-events:none;transition:opacity .3s}

/* modal */
.ovbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center}
.ovbg.on{display:flex}
.modal{background:#fff;border-radius:14px;width:310px;padding:18px;border:1px solid #ddd;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.mt{font-size:15px;font-weight:700;color:#111;margin-bottom:4px}
.ms{font-size:11px;color:#888;margin-bottom:12px}
.fl{display:block;font-size:10px;color:#555;margin-bottom:3px;font-weight:600}
.req{color:#E24B4A;font-weight:400}
.fi{width:100%;padding:9px 11px;border:1.5px solid #ddd;border-radius:7px;font-size:14px;background:#fff;color:#111;outline:none;margin-bottom:8px;font-family:inherit}
.fi:focus{border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.15)}
.fi.err{border-color:#E24B4A}
.szr{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.szb{padding:9px;border:2px solid #ddd;border-radius:7px;background:#fff;color:#333;font-size:12px;cursor:pointer;text-align:center;font-family:inherit;font-weight:600}
.szb.sel{border-color:#378ADD;background:#EEF6FF;color:#0C447C}
.b2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:5px}
.bcx{padding:9px;border:1.5px solid #ddd;border-radius:7px;background:#fff;color:#777;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.bcx:active{background:#f5f5f5}
.bsv{padding:9px;border:none;border-radius:7px;background:#185FA5;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.bsv:active{background:#0C447C}
.ag{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.ab{padding:12px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;text-align:left;display:flex;align-items:center;gap:9px;font-family:inherit}
.ab:active{filter:brightness(.92)}
.ao{background:#FAEEDA;color:#633806}.ad{background:#f5f4f0;color:#222}.ac{background:#FCEBEB;color:#791F1F}
.dr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0efea;font-size:12px}
.dl{color:#888}.dv{font-weight:700;color:#111}
.warn-box{background:#FFF8E6;border:1.5px solid #BA7517;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#633806;line-height:1.5}

/* ── NAVBAR ── */
.navbar{display:flex;gap:4px;flex-shrink:0;background:#fff;border:1px solid #ddd;border-radius:9px;padding:4px;overflow:hidden}
.nav-btn{flex:1;padding:7px 4px;font-size:11px;font-weight:700;border:none;border-radius:6px;background:none;color:#555;cursor:pointer;font-family:inherit;transition:background .15s,color .15s;white-space:nowrap}
.nav-btn:active{background:#f5f4f0}
.nav-btn.nav-active{background:#185FA5;color:#fff}

/* ── PAINEL DO DIA ── */
.painel-wrap{flex:1;min-height:0;overflow-y:auto;background:#fff;border:1px solid #ccc;border-radius:9px;padding:10px}
.painel-sec{margin-bottom:16px}
.painel-sec-title{font-size:10px;font-weight:700;color:#185FA5;border-bottom:2px solid #e8eef8;padding-bottom:3px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.painel-stat-row{display:flex;gap:6px;margin-bottom:8px}
.painel-stat-card{flex:1;background:#f5f4f0;border-radius:8px;padding:8px 6px;text-align:center}
.painel-stat-val{font-size:20px;font-weight:700}
.painel-stat-lbl{font-size:9px;color:#888;margin-top:2px;white-space:nowrap}
.painel-event-row{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid #f0efea;font-size:11px}
.painel-event-row:last-child{border-bottom:none}
.painel-badge{border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;white-space:nowrap;flex-shrink:0;color:#fff}
.painel-staff-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f0efea;font-size:11px}
.painel-staff-item:last-child{border-bottom:none}

/* ── BUSCA RÁPIDA ── */
.busca-bar{flex-shrink:0;display:none;background:#fff;border:1px solid #ddd;border-radius:9px;padding:5px 8px;align-items:center;gap:6px}
.busca-bar.on{display:flex}
.busca-btn{background:none;border:1px solid #e0ddd8;border-radius:5px;padding:3px 8px;font-size:13px;cursor:pointer;font-family:inherit;line-height:1.4;color:#555}
.busca-btn:active{background:#f5f4f0}
@keyframes pulse-search{0%,100%{outline-color:#185FA5;background:rgba(24,95,165,.09)}50%{outline-color:#A32D2D;background:rgba(163,45,45,.09)}}
.search-hit{outline:3px solid #185FA5 !important;outline-offset:-2px;animation:pulse-search 1.2s ease-in-out 3}

/* ── PLANTÃO INDICATOR ── */
.plantao-ind{font-size:10px;color:#0F6E56;font-weight:700;background:#EEF9F2;border:1px solid #A6D8B6;border-radius:4px;padding:2px 5px;cursor:pointer;white-space:nowrap;user-select:none}
.plantao-ind.zero{color:#888;background:#f5f4f0;border-color:#e0ddd8}

/* ── PIN / GESTÃO ── */
.pin-display{display:flex;gap:10px;justify-content:center;margin:14px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #ddd;background:#fff;transition:background .12s,border-color .12s}
.pin-dot.filled{background:#185FA5;border-color:#185FA5}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:6px 0}
.pin-key{padding:13px;font-size:18px;font-weight:700;border:1.5px solid #ddd;border-radius:9px;background:#fff;color:#111;cursor:pointer;font-family:inherit;text-align:center;line-height:1}
.pin-key:active{background:#f0efea}
.pin-key.del{font-size:13px;color:#A32D2D;border-color:#FCEBEB}
.pin-key.ok{background:#EEF6FF;color:#185FA5;border-color:#378ADD;font-size:13px}
.gestao-menu-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid #eee;border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fafafa;font-size:13px;font-weight:600;color:#333}
.gestao-menu-item:active{background:#f0efea}
.gestao-menu-sep{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px;padding:0 2px}

/* ── RELATÓRIOS ── */
.rel-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0efea;font-size:12px}
.rel-row:last-child{border-bottom:none}
.rel-badge{background:#EEF6FF;color:#185FA5;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700}

/* ── PORTRAIT ── */
@media(orientation:portrait){
  .tb-passeio{display:none}
  .tb-ob{display:none}
  .apt-lbl{font-size:2.5vw}
  .id-lbl{font-size:1.2vw}
}
</style>
</head>
<body>
<div class="page">

  <!-- TOPBAR UNIFICADA -->
  <div class="topbar">
    <div class="tb-name">
      <div class="an">🅿 GarageSpot</div>
      <div class="as-dev">Developed by Douglas Nascimento</div>
    </div>
    <div class="tb-stats">
      <div class="tb-stat"><div class="tb-val tv-total" id="st">–</div><div class="tb-lbl">Total</div></div>
      <div class="tb-stat"><div class="tb-val tv-free" id="sf">–</div><div class="tb-lbl">Disponíveis</div></div>
      <div class="tb-stat"><div class="tb-val tv-occ" id="so">0</div><div class="tb-lbl">Ocupadas</div></div>
      <div class="tb-stat"><div class="tb-val tv-out" id="sp">0</div><div class="tb-lbl">A passeio</div></div>
    </div>
    <div class="tb-ob">
      <div class="tb-stat"><div class="tb-val" style="color:#0F6E56" id="sob-free">–</div><div class="tb-lbl" style="color:#A32D2D">OB livre</div></div>
      <div class="tb-stat"><div class="tb-val" style="color:#A32D2D" id="sob">0</div><div class="tb-lbl" style="color:#A32D2D">OB ocup.</div></div>
    </div>
    <!-- Lista inline de passeio -->
    <div class="tb-passeio" id="tb-passeio">
      <span class="tb-out-lbl">Passeio:</span>
      <div class="tb-passeio-items" id="tb-pi-list"><span style="font-size:10px;color:#bbb">—</span></div>
      <button class="tb-more" id="tb-more" onclick="togglePanel()" style="display:none" title="Ver todos">···</button>
    </div>
    <div class="tb-right">
      <span class="plantao-ind zero" id="plantao-ind" onclick="showPlantaoTooltip()" title="Usuários no plantão">👤0</span>

<script>
const S={}, PASSEIO={}, HOSPEDAGENS={};
let USUARIOS=[];
let cur=null, ssz='small';
// Overbooking VERMELHO: corredores + 6D-9D
const OB=new Set(['CORREDOR 01','CORREDOR 02','CORREDOR 03','6D','7D','8D','9D']);
// Vagas D azuis normais (1D-5D) — não são overbooking
const D_NORMAL=new Set(['1D','2D','3D','4D','5D']);
const FIXED=new Set(['CORREDOR 01','CORREDOR 02','CORREDOR 03','2E','3E','4E']);
let TOTAL=0;

// Proporções relativas das colunas (do Excel) — serão usadas como fr no CSS
// A:12.4  B:13  C:12.7  D:12.1  E:11.1  F:10.7  G:12.1  H:11.4  I:11.7  J:11.1  K:1.7  L:12.6
const COL_FR = [12.4, 13, 12.7, 12.1, 11.1, 10.7, 12.1, 11.4, 11.7, 11.1, 1.7, 12.6];
// Proporções relativas das linhas
// R1:99  R2-10:34.5 cada  R11:89.25  R12:89.25
const ROW_FR = [99, 34.5, 34.5, 34.5, 34.5, 34.5, 34.5, 34.5, 34.5, 34.5, 89.25, 89.25];

// Layout exato do Excel
// [id, tipo, rowspan?, colspan?]
const ROWS = [
  [['1E','v'],  ['1C','v'],['2C','v'],['3C','v'],['4C','v'],['5C','v'],['6C','v'],['7C','v'],['8C','v'],['9C','v'], ['','s'],['EXTRA 01','v']],
  [['2E','v',3],['CORREDOR 01','c',9,3],null,null,['CORREDOR 02','c',9,3],null,null,['CORREDOR 03','c',9,3],null,null,['','s'],['GARAGEM\nHOTEL','h']],
  [null,null,null,null,null,null,null,null,null,null,['','s'],['1D','v']],
  [null,null,null,null,null,null,null,null,null,null,['','s'],['2D','v']],
  [['3E','v',3],null,null,null,null,null,null,null,null,null,['','s'],['3D','v']],
  [null,null,null,null,null,null,null,null,null,null,['','s'],['4D','v']],
  [null,null,null,null,null,null,null,null,null,null,['','s'],['5D','v']],
  [['4E','v',3],null,null,null,null,null,null,null,null,null,['','s'],['6D','v']],
  [null,null,null,null,null,null,null,null,null,null,['','s'],['7D','v']],
  [null,null,null,null,null,null,null,null,null,null,['','s'],['8D','v']],
  [['','b'],['1B','v'],['2B','v'],['3B','v'],['4B','v'],['5B','v'],['6B','v'],['7B','v'],['8B','v'],['9B','v'],['','s'],['9D','v']],
  [['','b'],['1A','v'],['2A','v'],['3A','v'],['4A','v'],['5A','v'],['6A','v'],['7A','v'],['8A','v'],['9A','v'],['','s'],['EXTRA 02','v']],
];

function initState(){
  let totalNormal=0;
  ROWS.forEach(row=>row.forEach(cell=>{
    if(!cell||!cell[0]||'sbh'.includes(cell[1]))return;
    S[cell[0]]={status:'free',apt:'',model:'',color:'',plate:'',guest:'',obs:'',size:'small',
                overbook:OB.has(cell[0]),mergedMaster:false,mergedSlave:false,
                hmergeWith:null,hospedagem:''}; // merge horizontal: id da vaga coberta
    TOTAL++;
    if(!OB.has(cell[0])) totalNormal++;
  }));
  // Total exibido = apenas vagas normais (sem overbooking)
  document.getElementById('st').textContent=totalNormal;
}

function buildTable(){
  const tbl=document.getElementById('gtable');

  // colgroup com larguras proporcionais em %
  const totalFr=COL_FR.reduce((a,b)=>a+b,0);
  const cg=document.createElement('colgroup');
  COL_FR.forEach(fr=>{
    const c=document.createElement('col');
    c.style.width=(fr/totalFr*100).toFixed(3)+'%';
    cg.appendChild(c);
  });
  tbl.appendChild(cg);

  // Calcular alturas proporcionais em % para cada row
  const totalRh=ROW_FR.reduce((a,b)=>a+b,0);

  const covered=new Set();
  ROWS.forEach((row,ri)=>{
    const tr=document.createElement('tr');
    // Altura em % via estilo
    tr.style.height=(ROW_FR[ri]/totalRh*100).toFixed(3)+'%';

    row.forEach((cell,ci)=>{
      if(covered.has(`${ri},${ci}`)||cell===null)return;
      const[id,tipo,rs=1,cs=1]=cell;
      const td=document.createElement('td');
      if(rs>1){td.rowSpan=rs;for(let r=1;r<rs;r++)for(let c=0;c<cs;c++)covered.add(`${ri+r},${ci+c}`);}
      if(cs>1){td.colSpan=cs;for(let c=1;c<cs;c++)covered.add(`${ri},${ci+c}`);}

      if(tipo==='s'){td.className='sep';}
      else if(tipo==='b'){td.className='blk';}
      else if(tipo==='h'){td.className='hotel';td.innerHTML=`<span style="font-size:.9vw;font-weight:700;color:#555;line-height:1.4;white-space:pre">${id}</span>`;}
      else if(tipo==='c'){
        td.className='corr';td.dataset.id=id;
        td.innerHTML=cellHTML(id);
        td.addEventListener('click',()=>clkV(id));
      } else {
        td.className='vv';td.dataset.id=id;
        td.innerHTML=cellHTML(id);
        td.addEventListener('click',()=>clkV(id));
      }
      tr.appendChild(td);
    });
    tbl.appendChild(tr);
  });
}

// Reconstrói a tabela preservando o estado S (usado na rotação)
function rebuildTable(){
  const tbl=document.getElementById('gtable');
  tbl.innerHTML='';
  buildTable();
  Object.keys(S).forEach(id=>ref(id));
  // Reaplicar merges horizontais visuais
  Object.entries(S).forEach(([id,d])=>{
    if(d.hmergeWith && d.status==='occupied'){
      const tdSrc=getTd(id); const tdAlvo=getTd(d.hmergeWith);
      if(tdSrc && tdAlvo){
        // Só aplica se este é o "dono" (não o coberto)
        // O dono tem colSpan e o coberto some — evita dupla aplicação
        if(S[d.hmergeWith]?.hmergeWith===id){
          // Determina quem é o dono: o de menor colspan (ou o mais à esquerda)
          const numId=parseInt(id); const numAlvo=parseInt(d.hmergeWith);
          if(numId > numAlvo){ // id é mais à direita, alvo é mais à esquerda
            tdSrc.classList.add('hmerge-hidden');
            if(tdAlvo) tdAlvo.colSpan=2;
          } else {
            tdSrc.colSpan=2;
            tdAlvo.classList.add('hmerge-hidden');
          }
        }
      }
    }
  });
  attachDrag();
  positionPilares();
}

function cellHTML(id){
  return `<span class="id-lbl">${id}</span>`;
}

function getTd(id){return document.querySelector(`[data-id="${id}"]`);}

// Verifica duplicidade REAL: mesmo apt em vagas INDEPENDENTES (exclui merge do mesmo carro)
function isDup(apt){
  if(!apt) return false;
  let count=0;
  Object.entries(S).forEach(([id,d])=>{
    if(d.status==='occupied' && d.apt===apt && !d.mergedSlave) count++;
  });
  // count=1 → apenas um carro (mesmo que ocupe 2 células via merge)
  // count>1 → realmente mais de um carro usando o mesmo apt
  return count>1;
}

// Retorna a classe de cor correta para uma vaga ocupada
function occClass(id, apt){
  if(isDup(apt)) return 'dup-occ';
  if(OB.has(id)) return 'ob-occ';
  return 'occ'; // azul padrão (inclui 1D-5D e todos os outros)
}

function ref(id){
  const d=S[id],td=getTd(id);
  if(!td)return;
  if(d.mergedSlave){td.style.display='none';return;}
  td.style.display='';
  const isC=id.startsWith('CORREDOR');
  let cls=isC?'corr':'vv';
  if(d.status==='occupied') cls+=' '+occClass(id,d.apt);
  td.className=cls;
  if(id.endsWith('B')&&!FIXED.has(id)) td.rowSpan=d.mergedMaster?2:1;
  if(d.status==='free'){
    td.innerHTML=`<span class="id-lbl">${id}</span>`;
  } else {
    const aptCls=isDup(d.apt)?'dup':(OB.has(id)?'ob':'');
    td.innerHTML=`<span class="id-lbl">${id}</span><span class="apt-lbl${aptCls?' '+aptCls:''}">${d.apt}</span>`;
  }
}

// Atualiza todas as vagas que têm um determinado apt (para pintar/despintar duplicidade)
function refByApt(apt){
  Object.entries(S).forEach(([id,d])=>{if(d.apt===apt||d.status==='occupied')ref(id);});
}

// ── PILARES DE CONCRETO ───────────────────────────────────────────────────
// Posições exatas do drawing1.xml (col 0-based, row 0-based):
// P1: col3→4 (7C|6C), row0→1 — borda direita de 7C / esquerda de 6C, na fileira superior
// P2: col5→6 (5C|4C), row0→1 — borda direita de 5C / esquerda de 4C, na fileira superior
// P3: col7→8 (3C|2C), row0→1 — borda direita de 3C / esquerda de 2C, na fileira superior
// P4: col0→1 (1E|9C), row0→1 — borda direita de 1E / esquerda de 9C, na fileira superior
// P5: col2→3 (8B|7B), row9→10 — borda direita de 8B / esquerda de 7B, nas fileiras B/A
// P6: col6→7 (4B|3B), row9→10 — borda direita de 4B / esquerda de 3B, nas fileiras B/A

function positionPilares(){
  const tbl = document.getElementById('gtable');
  const rel  = document.getElementById('map-rel');
  if(!tbl||!rel) return;

  const relRect = rel.getBoundingClientRect();

  // Tamanho do pilar proporcional à tabela
  const tblRect = tbl.getBoundingClientRect();
  const pw = Math.max(8, Math.round(tblRect.width * 0.013));
  const ph = Math.max(8, Math.round(pw * 0.9));

  // Cada pilar: pega as duas células vizinhas e usa suas bordas reais
  // pos vertical: 'row1_bottom' = borda inferior de row1 (entre fileira C e corredor)
  //               'row10_bottom' = borda inferior de row10 (entre corredor e fileira B)
  const pilarDefs = [
    // Grupo 1 — fileira superior (row 0→1): borda entre fileira C e corredor
    // P1: col3→4 físico = vagas 3C|4C (após rename)
    { id:'pilar-1', leftId:'3C', rightId:'4C', vertRef:'3C', vertEdge:'bottom' },
    // P2: col5→6 físico = vagas 5C|6C
    { id:'pilar-2', leftId:'5C', rightId:'6C', vertRef:'5C', vertEdge:'bottom' },
    // P3: col7→8 físico = vagas 7C|8C
    { id:'pilar-3', leftId:'7C', rightId:'8C', vertRef:'7C', vertEdge:'bottom' },
    // P4: col0→1 físico = vagas 1E|1C
    { id:'pilar-4', leftId:'1E', rightId:'1C', vertRef:'1E', vertEdge:'bottom' },
    // Grupo 2 — fileiras B/A: borda superior de row B (entre corredor e fileiras B/A)
    // P5: col2→3 físico = vagas 2B|3B
    { id:'pilar-5', leftId:'2B', rightId:'3B', vertRef:'2B', vertEdge:'top' },
    // P6: col6→7 físico = vagas 6B|7B
    { id:'pilar-6', leftId:'6B', rightId:'7B', vertRef:'6B', vertEdge:'top' },
  ];

  pilarDefs.forEach(def=>{
    const el   = document.getElementById(def.id);
    if(!el) return;

    const tdL  = document.querySelector(`[data-id="${def.leftId}"]`);
    const tdR  = document.querySelector(`[data-id="${def.rightId}"]`);
    const tdV  = document.querySelector(`[data-id="${def.vertRef}"]`);
    if(!tdL||!tdR||!tdV){ el.style.display='none'; return; }

    const rL = tdL.getBoundingClientRect();
    const rR = tdR.getBoundingClientRect();
    const rV = tdV.getBoundingClientRect();

    // Centro horizontal: entre borda direita de L e borda esquerda de R
    const centerX = ((rL.right + rR.left) / 2) - relRect.left;

    // Centro vertical: na borda indicada (top ou bottom) da célula de referência
    const centerY = def.vertEdge === 'bottom'
      ? rV.bottom - relRect.top
      : rV.top    - relRect.top;

    el.style.display = 'block';
    el.style.width   = pw + 'px';
    el.style.height  = ph + 'px';
    el.style.left    = (centerX - pw/2) + 'px';
    el.style.top     = (centerY - ph/2) + 'px';
  });
}

function togglePanel(){
  const body=document.getElementById('panel-body');
  const btn=document.getElementById('pt-arrow');
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  body.classList.toggle('closed',isOpen);
  btn.style.opacity=isOpen?'0.5':'1';
  requestAnimationFrame(positionPilares);
}

function upd(){
  let occ=0, free=0, ob_occ=0, ob_free=0;
  Object.entries(S).forEach(([id,d])=>{
    if(d.mergedSlave) return;
    if(d.overbook){
      if(d.status==='occupied') ob_occ++;
      else ob_free++;
    } else {
      if(d.status==='occupied') occ++;
      else free++;
    }
  });
  const out=Object.keys(PASSEIO).length;

  // Calcula o "peso" dos carros a passeio nas vagas disponíveis
  // Carro grande (size='large') vale 2 vagas, pequeno vale 1
  let passeioWeight=0;
  Object.values(PASSEIO).forEach(d=>{
    passeioWeight += (d.size==='large') ? 2 : 1;
  });

  const disponiveis = Math.max(0, free - passeioWeight);

  // Topbar stats
  document.getElementById('sf').textContent      = disponiveis;
  document.getElementById('so').textContent      = occ;
  document.getElementById('sp').textContent      = out;
  document.getElementById('sob').textContent     = ob_occ;
  document.getElementById('sob-free').textContent= ob_free;
  document.getElementById('oc2').textContent     = out;
  renderP();
}

function renderP(){
  const ol    = document.getElementById('ol');
  const piList= document.getElementById('tb-pi-list');
  const more  = document.getElementById('tb-more');
  const items = Object.entries(PASSEIO);

  // Painel expandido
  if(!items.length){
    ol.innerHTML='<span class="oe">Nenhum carro fora no momento</span>';
    piList.innerHTML='<span style="font-size:10px;color:#bbb">—</span>';
    if(more) more.style.display='none';
    // Botões continuam visíveis — só esconde os de restore se não houver backup
    return;
  }

  ol.innerHTML='';
  items.forEach(([apt,d])=>{
    const info=[d.model,d.color].filter(Boolean).join(' · ');
    const isLarge=d.size==='large';
    const dv=document.createElement('div');dv.className='oi';
    dv.innerHTML=`
      <div style="display:flex;align-items:center;gap:5px">
        <div class="oa">${apt}</div>
        ${isLarge?'<span style="font-size:9px;background:#E3F2FD;color:#185FA5;border-radius:3px;padding:1px 4px;font-weight:700;line-height:1.4">🚐 Grande</span>':''}
      </div>
      ${info?`<div class="oin">${info}</div>`:''}`;

    // Clique normal → detalhes
    dv.addEventListener('click',()=>showPasseioDetail(apt));

    // Long press → opção de checkout
    let _lpT=null;
    const startLp=()=>{
      dv.style.transition='transform .4s';
      dv.style.transform='scale(0.93)';
      _lpT=setTimeout(()=>{
        _lpT=null;
        dv.style.transform='';dv.style.transition='';
        showPasseioCheckout(apt);
      },600);
    };
    const cancelLp=()=>{
      if(_lpT){clearTimeout(_lpT);_lpT=null;}
      dv.style.transform='';dv.style.transition='';
    };
    dv.addEventListener('mousedown',startLp);
    dv.addEventListener('mouseup',cancelLp);
    dv.addEventListener('mouseleave',cancelLp);
    dv.addEventListener('touchstart',startLp,{passive:true});
    dv.addEventListener('touchend',cancelLp);
    dv.addEventListener('touchmove',cancelLp,{passive:true});

    ol.appendChild(dv);
  });

  // Lista inline — cabe quantos couberem, resto vira "···"
  piList.innerHTML='';
  // Renderiza até MAX_INLINE itens, o resto mostra ···
  const MAX_INLINE = 4;
  const visible = items.slice(0, MAX_INLINE);
  const hidden  = items.length - visible.length;

  visible.forEach(([apt,d])=>{
    const btn=document.createElement('span');
    btn.className='tb-pi'+(d.size==='large'?' large-badge':'');
    btn.textContent=apt;
    btn.title=([d.model,d.color,d.plate].filter(Boolean).join(' · '))||'Apt. '+apt;
    btn.addEventListener('click',()=>showPasseioDetail(apt));
    piList.appendChild(btn);
  });

  if(more){
    if(hidden>0){
      more.style.display='';
      more.textContent='···';
      more.title=`+${hidden} mais`;
    } else {
      more.style.display='none';
    }
  }
}

// ── ARRASTAR VAGA (drag & drop) ───────────────────────────────────────────
let dragState = null;   // { id, apt, model, color, plate, guest, obs, size }
let ghost     = null;   // elemento visual que segue o dedo/cursor

function startDrag(id, startX, startY){
  if(!S[id] || S[id].status==='free') return;
  const d = S[id];
  dragState = {id, apt:d.apt, model:d.model, color:d.color,
               plate:d.plate, guest:d.guest, obs:d.obs||'', size:d.size||'small'};

  // Destaca vaga de origem
  const td = getTd(id); if(td) td.classList.add('drag-src');

  // Cria ghost visual
  ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.textContent = '🚗 Apt. ' + d.apt + (d.size==='large' ? '  🚐' : '');
  ghost.style.left = startX+'px';
  ghost.style.top  = startY+'px';
  document.body.appendChild(ghost);

  // Banner
  document.getElementById('move-apt-lbl').textContent = 'Apt. '+d.apt;
  document.getElementById('move-banner').classList.add('on');
}

function moveDrag(x, y){
  if(!dragState || !ghost) return;
  ghost.style.left = x+'px';
  ghost.style.top  = y+'px';

  // Destaca a célula sob o cursor/dedo
  document.querySelectorAll('.drag-over').forEach(e=>e.classList.remove('drag-over'));
  const el = document.elementFromPoint(x, y);
  const td = el && el.closest ? el.closest('[data-id]') : null;
  if(td && td.dataset.id && S[td.dataset.id] && S[td.dataset.id].status==='free'){
    td.classList.add('drag-over');
  }
}

// Garante limpeza total do estado de drag em qualquer situação
function forceCleanDrag(){
  if(!dragState && !ghost) return;
  // Remove ghost do DOM
  if(ghost){ ghost.remove(); ghost=null; }
  // Remove classes visuais
  if(dragState){
    const td=getTd(dragState.id); if(td) td.classList.remove('drag-src');
  }
  document.querySelectorAll('.drag-over').forEach(e=>e.classList.remove('drag-over'));
  const banner=document.getElementById('move-banner');
  if(banner) banner.classList.remove('on');
  dragState=null;
  // Remove qualquer ghost órfão que possa ter ficado
  document.querySelectorAll('.drag-ghost').forEach(e=>e.remove());
}

window.cancelMove = function(){
  forceCleanDrag();
};

function dropDrag(x, y){
  if(!dragState) return;
  const ms = {...dragState};

  // Limpa TUDO antes de processar o drop
  forceCleanDrag();

  // Descobre a célula de destino
  const el = document.elementFromPoint(x, y);
  const td = el && el.closest ? el.closest('[data-id]') : null;
  const destId = td && td.dataset.id;

  // Se não caiu em vaga livre válida, cancela sem mover
  if(!destId || !S[destId] || S[destId].status!=='free' || destId===ms.id) return;

  executarMove(ms, destId);
}

function executarMove(ms, destId){
  // Remove da vaga de origem sem ir para passeio
  const src = S[ms.id];
  if(ms.id.endsWith('B') && src.mergedMaster){
    const aId = ms.id.slice(0,-1)+'A';
    const tdB = getTd(ms.id); if(tdB) tdB.rowSpan=1;
    src.mergedMaster=false;
    if(S[aId]){S[aId].mergedSlave=false;S[aId].status='free';S[aId].apt='';ref(aId);}
  }
  if(ms.id.endsWith('A') && src.mergedSlave){
    const bId=ms.id.slice(0,-1)+'B';
    const tdB=getTd(bId);if(tdB)tdB.rowSpan=1;
    if(S[bId]){S[bId].mergedMaster=false;S[bId].status='free';S[bId].apt='';ref(bId);}
    src.mergedSlave=false;
  }
  src.status='free';src.apt='';src.model='';src.color='';src.plate='';
  src.guest='';src.obs='';src.size='small';src.mergedMaster=false;src.mergedSlave=false;
  ref(ms.id);

  const isA      = destId.endsWith('A');
  const bId      = isA ? destId.slice(0,-1)+'B' : null;
  const bOcupada = bId && S[bId] && S[bId].status==='occupied';

  if(isA && !bOcupada){
    // Pergunta tamanho — se cancelar, restaura origem
    cur  = destId;
    ssz  = ms.size || 'small';
    const mc = document.getElementById('mc');
    mc.innerHTML=`
      <div class="mt">🚗 Mover para ${destId}</div>
      <div class="ms">Apt. ${ms.apt} · Confirme o tamanho</div>
      <div class="szr">
        <div class="szb ${ssz==='small'?'sel':''}" id="f-szs" onclick="setSz('small')">🚗 Pequeno</div>
        <div class="szb ${ssz==='large'?'sel':''}" id="f-szl" onclick="setSz('large')">🚐 Grande</div>
      </div>
      <div class="b2">
        <button class="bcx" id="mv-cancel">Cancelar</button>
        <button class="bsv" id="mv-ok">Confirmar</button>
      </div>`;
    document.getElementById('ov').classList.add('on');
    // Cancelar: restaura carro na origem
    document.getElementById('mv-cancel').onclick=function(){
      ssz=ms.size||'small';
      saveV(ms.id,ms.apt,ms.model,ms.color,ms.plate,ms.guest,ms.obs);
      refByApt(ms.apt);upd();closeOv();
    };
    document.getElementById('mv-ok').onclick=function(){
      saveV(destId,ms.apt,ms.model,ms.color,ms.plate,ms.guest,ms.obs);
      refByApt(ms.apt);upd();closeOv();
    };
  } else {
    if(isA && bOcupada) ssz='small';
    else ssz = isA ? (ms.size||'small') : 'small';
    saveV(destId,ms.apt,ms.model,ms.color,ms.plate,ms.guest,ms.obs);
    refByApt(ms.apt);upd();
  }
}

// Touch & Mouse events para arrastar
function attachDrag(){
  document.querySelectorAll('.vv,.corr').forEach(el=>{
    if(el._dragMD){el.removeEventListener('mousedown',el._dragMD);el._dragMD=null;}
    if(el._dragTS){el.removeEventListener('touchstart',el._dragTS);el._dragTS=null;}
    if(el._dragMU2){el.removeEventListener('mouseup',el._dragMU2);el._dragMU2=null;}
    if(el._dragTE2){el.removeEventListener('touchend',el._dragTE2);el._dragTE2=null;}

    const id = el.dataset.id;
    if(!id) return;

    let holdTimer=null;

    function beginHold(x,y){
      if(!S[id]||S[id].status==='free') return;
      // Feedback visual: borda que vai crescendo durante o hold
      el.style.transition='outline-width .9s ease';
      el.style.outline='0px solid #E65100';
      el.style.outlineOffset='-2px';
      requestAnimationFrame(()=>{ el.style.outline='4px solid #E65100'; });
      holdTimer=setTimeout(()=>{
        holdTimer=null;
        el.style.transition='';el.style.outline='';el.style.outlineOffset='';
        startDrag(id,x,y);
      },800);
    }
    function cancelHold(){
      if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
      el.style.transition='';el.style.outline='';el.style.outlineOffset='';
    }

    el._dragMD = function(e){
      if(e.button!==0||!S[id]||S[id].status==='free') return;
      e.preventDefault();
      beginHold(e.clientX,e.clientY);
    };
    el._dragMU2 = function(){ cancelHold(); };
    el._dragTS = function(e){
      if(!S[id]||S[id].status==='free') return;
      const t=e.touches[0];
      beginHold(t.clientX,t.clientY);
    };
    el._dragTE2 = function(){ cancelHold(); };
    // Suprime menu de contexto do navegador durante o hold/drag
    el._dragCM = function(e){ e.preventDefault(); };

    el.addEventListener('mousedown',  el._dragMD);
    el.addEventListener('mouseup',    el._dragMU2);
    el.addEventListener('mouseleave', el._dragMU2);
    el.addEventListener('touchstart', el._dragTS,{passive:true});
    el.addEventListener('touchend',   el._dragTE2);
    el.addEventListener('touchmove',  el._dragTE2,{passive:true});
    el.addEventListener('contextmenu',el._dragCM);
  });

  // Handlers globais de movimento e soltar
  if(!window._dragMM){
    window._dragMM = function(e){
      if(!dragState) return;
      const x=e.clientX, y=e.clientY;
      moveDrag(x,y);
    };
    window._dragTM = function(e){
      if(!dragState) return;
      const t=e.touches[0];
      moveDrag(t.clientX, t.clientY);
    };
    window._dragMU = function(e){ if(dragState) dropDrag(e.clientX, e.clientY); };
    window._dragTE = function(e){
      if(!dragState) return;
      const t=e.changedTouches[0];
      dropDrag(t.clientX, t.clientY);
    };
    document.addEventListener('mousemove',  window._dragMM);
    document.addEventListener('touchmove',  window._dragTM, {passive:true});
    document.addEventListener('mouseup',    window._dragMU);
    document.addEventListener('touchend',   window._dragTE);
  }
}

// ── MERGE HORIZONTAL (vagas 4B-7B) ───────────────────────────────────────
// Vizinhos possíveis (na mesma fileira B, lado a lado)
const HMERGE_OPTS = {
  '3B': ['4B'],
  '4B': ['3B','5B'],
  '5B': ['4B','6B'],
  '6B': ['5B'],
};

// Aplica merge horizontal: id ocupa colspan=2, alvo some
function aplicarHMerge(id, alvoId){
  const tdSrc = getTd(id);
  const tdAlvo = getTd(alvoId);
  if(!tdSrc||!tdAlvo) return;
  S[id].hmergeWith = alvoId;
  S[alvoId].hmergeWith = id; // referência cruzada para desfazer
  S[alvoId].status = 'occupied';
  S[alvoId].apt    = S[id].apt;
  tdSrc.colSpan = 2;
  tdAlvo.classList.add('hmerge-hidden');
  ref(id);
  setTimeout(positionPilares, 50);
}

// Desfaz merge horizontal
function desfazHMerge(id){
  const alvoId = S[id]?.hmergeWith;
  if(!alvoId) return;
  const tdSrc = getTd(id);
  const tdAlvo = getTd(alvoId);
  if(tdSrc) tdSrc.colSpan = 1;
  if(tdAlvo) tdAlvo.classList.remove('hmerge-hidden');
  if(S[alvoId]){
    S[alvoId].hmergeWith = null;
    S[alvoId].status = 'free';
    S[alvoId].apt    = '';
    ref(alvoId);
  }
  S[id].hmergeWith = null;
  setTimeout(positionPilares, 50);
}

// Pergunta se quer fazer merge horizontal após salvar o carro
function perguntarHMerge(id, apt, model, color, plate, guest, obs){
  const opts = HMERGE_OPTS[id];
  if(!opts){ upd();closeOv();return; }

  // Filtra apenas vizinhos LIVRES
  const livres = opts.filter(v=>S[v]&&S[v].status==='free');
  if(!livres.length){ upd();closeOv();return; } // nenhum vizinho livre — fecha normalmente

  const mc = document.getElementById('mc');

  // Monta opções com info da vaga A atrás
  const opcoesHTML = livres.map(v=>{
    const num = v.slice(0,-1);
    const aId = num+'A';
    const aInfo = S[aId]&&S[aId].status==='occupied'
      ? `· Apt. <strong>${S[aId].apt}</strong> atrás`
      : '';
    const lado = (parseInt(v) > parseInt(id)) ? 'esquerda' : 'direita';
    return `<button class="ab ao" id="hm-${v}" style="margin-bottom:6px">
      Vaga ${v} · ${lado} ${aInfo}
    </button>`;
  }).join('');

  mc.innerHTML=`
    <div class="mt">Mesclar com vaga ao lado?</div>
    <div class="ms" style="margin-bottom:10px">Apt. ${apt} · Vaga ${id}</div>
    ${opcoesHTML}
    <button class="bcx" onclick="closeOv()" style="width:100%;margin-top:6px">Não, só esta vaga</button>`;
  document.getElementById('ov').classList.add('on');

  livres.forEach(v=>{
    document.getElementById('hm-'+v).onclick=function(){
      aplicarHMerge(id, v);
      upd();closeOv();
    };
  });
}

function perguntarCheckin(vagaId, apt, model, color, plate, guest, obs){
  const mc=document.getElementById('mc');
  // Verifica se apt já tem histórico ativo (sem checkout)
  const hist=HISTORICO[apt]||[];
  const temHistoricoAtivo=hist.length>0 && !hist.some(e=>e.tipo==='checkout');
  // Se já tem histórico ativo, registra como retorno normal sem perguntar
  if(temHistoricoAtivo){
    saveV(vagaId,apt,model,color,plate,guest,obs,null);
    return;
  }
  // Pergunta se é check-in
  mc.innerHTML=`
    <div class="mt">🏨 Check-in?</div>
    <div class="warn-box" style="font-size:12px">O apartamento <strong>${apt}</strong> não possui registro ativo no sistema.<br><br>Este veículo está fazendo check-in agora?</div>
    <div class="ag">
      <button class="bsv" id="ci-sim">✅ Sim, é check-in</button>
      <button class="bcx" id="ci-nao">Não — corrigir apartamento</button>
      <button class="bcx" onclick="closeOv()" style="margin-top:4px">Cancelar</button>
    </div>`;
  document.getElementById('ci-sim').onclick=function(){
    confirmarUsuario('fazendo o check-in',function(usuario){
      saveV(vagaId,apt,model,color,plate,guest,obs,true,usuario);
    });
  };
  document.getElementById('ci-nao').onclick=function(){
    showOcc(vagaId);
    setTimeout(()=>{const e=document.getElementById('f-apt');if(e){e.value='';e.focus();}},80);
  };
}

function saveV(id,apt,model,color,plate,guest,obs,isCheckin,usuario){
  const d=S[id];
  d.apt=String(apt||'');d.model=String(model||'');d.color=String(color||'');
  d.plate=String(plate||'');d.guest=String(guest||'');d.obs=String(obs||'');d.status='occupied';
  if(id.endsWith('A')){
    d.size=ssz;
    if(ssz==='large'){
      const bId=id.slice(0,-1)+'B';
      if(S[bId]){
        S[bId].mergedMaster=true;S[bId].status='occupied';S[bId].apt=d.apt;
        S[bId].size='large';S[bId].model=d.model;S[bId].color=d.color;
        S[bId].plate=d.plate;S[bId].guest=d.guest;S[bId].obs=d.obs;
        ref(bId);
      }
      d.mergedSlave=true;
    } else { d.mergedSlave=false;d.mergedMaster=false; }
  }
  const usuarioStr=usuario?(usuario.nome+' · '+usuario.cargo):'';
  if(isCheckin){
    const numH=nextNumHospedagem();
    d.hospedagem=numH;
    HOSPEDAGENS[numH]={numero:numH,apt,checkin_ts:Date.now(),checkout_ts:null,
      vaga_inicial:id,model,color,plate,guest,obs,size:ssz,
      usuario_checkin:usuarioStr,usuario_checkout:''};
    saveHospedagens();
    iniciarHistorico(apt,id,numH,usuarioStr);
    ref(id);refByApt(d.apt);
    if(HMERGE_OPTS[id]){ upd(); perguntarHMerge(id,d.apt,d.model,d.color,d.plate,d.guest,d.obs); return; }
    upd();closeOv();
    showToast('✅ Check-in registrado — Hospedagem '+numH);
  } else if(isCheckin===false){
    const hospNum=(PASSEIO[apt]?.hospedagem)||d.hospedagem||'';
    if(hospNum) d.hospedagem=hospNum;
    addHistorico(apt,'retorno_passeio',id,'',usuarioStr,hospNum);
    ref(id);refByApt(d.apt);
    if(HMERGE_OPTS[id]){ upd(); perguntarHMerge(id,d.apt,d.model,d.color,d.plate,d.guest,d.obs); return; }
    upd();closeOv();
  } else {
    ref(id);refByApt(d.apt);
    if(HMERGE_OPTS[id]){ upd(); perguntarHMerge(id,d.apt,d.model,d.color,d.plate,d.guest,d.obs); return; }
    upd();closeOv();
  }
}

      const temLateral = HMERGE_OPTS[id]&&HMERGE_OPTS[id].some(v=>S[v]&&S[v].status==='free');
      if(parLivre || temLateral){
        trocaBtn = `<button onclick="trocarParaGrande('${id}')" style="position:absolute;top:0;right:0;background:#FFF8E6;border:1px solid #BA7517;color:#633806;font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:600">🚐 Tornar grande</button>`;
      }
    }
  }

  mc.innerHTML=`
    <div class="mt" style="position:relative;padding-right:${trocaBtn?'110px':'0'}">Vaga ${id} — ${d.apt}${trocaBtn}</div>
    <div class="ms">🅿 Na garagem · ${info}</div>
    ${dupWarn}
    <div class="ag">
      <button class="ab ao" id="m-out">🛣️ &nbsp;Passeio</button>
      <button class="ab ad" id="m-det">ℹ️ &nbsp;Detalhes</button>
      <button class="ab ac" id="m-chk">🚪 &nbsp;Check-out</button>
    </div>
    <button class="bcx" onclick="closeOv()" style="width:100%;margin-top:9px">Fechar</button>`;
  document.getElementById('ov').classList.add('on');
  document.getElementById('m-out').onclick=()=>doOut(id);
  document.getElementById('m-det').onclick=()=>showDet(id);
  document.getElementById('m-chk').onclick=()=>doChk(id);
}

// Trocar carro grande → pequeno (carro fica só na B, libera a A)
window.trocarParaPequeno = function(id){
  const d = S[id];
  const bId = id.endsWith('B') ? id : id.slice(0,-1)+'B';
  const aId = bId.slice(0,-1)+'A';
  const apt=d.apt,model=d.model,color=d.color,plate=d.plate,guest=d.guest,
        obs=d.obs||'',hospedagem=d.hospedagem||'';

  // Desfaz merge horizontal se houver
  if(d.hmergeWith) desfazHMerge(id);

  // Desfaz merge vertical: libera AMBAS as células antes de re-ocupar só uma
  const tdB=getTd(bId);if(tdB)tdB.rowSpan=1;
  if(S[bId]){S[bId].mergedMaster=false;S[bId].status='free';S[bId].apt='';S[bId].size='small';}
  if(S[aId]){
    S[aId].mergedSlave=false;S[aId].status='free';S[aId].apt='';
    S[aId].model='';S[aId].color='';S[aId].plate='';S[aId].guest='';S[aId].obs='';S[aId].size='small';
    ref(aId);
  }

  // Carro fica sempre na vaga B (mais visível)
  ssz='small';
  S[bId].status='occupied';S[bId].apt=apt;S[bId].model=model;
  S[bId].color=color;S[bId].plate=plate;S[bId].guest=guest;S[bId].obs=obs;
  S[bId].hospedagem=hospedagem;
  S[bId].size='small';S[bId].mergedMaster=false;S[bId].mergedSlave=false;
  ref(bId);
  setTimeout(positionPilares, 50);
  refByApt(apt);upd();closeOv();
};

// Trocar carro pequeno → grande
// Para vagas 4B-7B: pergunta se mescla para trás (A) ou para o lado
window.trocarParaGrande = function(id){
  const d = S[id];
  const num = id.slice(0,-1);
  const aId = num+'A';
  const bId = num+'B';
  const apt=d.apt,model=d.model,color=d.color,plate=d.plate,guest=d.guest,obs=d.obs||'';
  const mc=document.getElementById('mc');

  // Opções disponíveis
  const opcoes=[];

  // Opção: mesclar com vaga A atrás (merge vertical)
  if(id.endsWith('B') && S[aId]&&S[aId].status==='free'){
    opcoes.push({tipo:'vertical', label:`🚐 Vaga ${aId} (atrás)`, id:aId});
  }

  // Opção: mesclar com vagas do lado (merge horizontal, só para 4B-7B)
  if(HMERGE_OPTS[id]){
    HMERGE_OPTS[id].filter(v=>S[v]&&S[v].status==='free').forEach(v=>{
      const vNum=v.slice(0,-1); const vAId=vNum+'A';
      const aInfo=S[vAId]&&S[vAId].status==='occupied'?` · Apt. ${S[vAId].apt} atrás`:'';
      const lado=(parseInt(v)>parseInt(id))?'esquerda':'direita';
      opcoes.push({tipo:'horizontal', label:`↔ Vaga ${v} (${lado}${aInfo})`, id:v});
    });
  }

  if(!opcoes.length){ closeOv(); return; }

  // Se só tem uma opção, aplica direto
  if(opcoes.length===1){
    const op=opcoes[0];
    if(op.tipo==='vertical'){
      S[id].status='free';S[id].apt='';S[id].size='small';S[id].mergedMaster=false;S[id].mergedSlave=false;ref(id);
      ssz='large'; saveV(aId,apt,model,color,plate,guest,obs);
    } else {
      aplicarHMerge(id,op.id); upd();closeOv();
    }
    return;
  }

  // Mostra opções
  const opHTML=opcoes.map((op,i)=>`
    <button class="ab ao" id="tg-op-${i}" style="margin-bottom:6px">${op.label}</button>`).join('');
  mc.innerHTML=`
    <div class="mt">🚐 Tornar grande — ${id}</div>
    <div class="ms" style="margin-bottom:10px">Apt. ${apt} · Escolha como mesclar:</div>
    ${opHTML}
    <button class="bcx" onclick="closeOv()" style="width:100%;margin-top:6px">Cancelar</button>`;
  document.getElementById('ov').classList.add('on');

  opcoes.forEach((op,i)=>{
    document.getElementById('tg-op-'+i).onclick=function(){
      if(op.tipo==='vertical'){
        S[id].status='free';S[id].apt='';S[id].size='small';S[id].mergedMaster=false;S[id].mergedSlave=false;ref(id);
        ssz='large'; saveV(aId,apt,model,color,plate,guest,obs);
      } else {
        aplicarHMerge(id,op.id); upd();closeOv();
      }
    };
  });
};

function doOut(id){

  confirmarUsuario('liberando para passeio',function(usuario){

    addHistorico(aptKey,'saida_passeio',id,'',usuarioStr,hospNum);
    const keyV='v_'+id, keyP='p_'+aptKey;
    if(ANEXOS[keyV]&&ANEXOS[keyV].length){
      ANEXOS[keyP]=[...ANEXOS[keyV]];
      saveAnexos();
    }
    if(d.hmergeWith) desfazHMerge(id);
    if(id.endsWith('B')&&d.mergedMaster){
      const aId=id.slice(0,-1)+'A';
      const tdB=getTd(id);if(tdB)tdB.rowSpan=1;

      if(S[bId]){S[bId].mergedMaster=false;S[bId].status='free';S[bId].apt='';ref(bId);}
      d.mergedSlave=false;
    }

// ── RESET / BACKUP / RESTAURAÇÃO ─────────────────────────────────────────
// Backups em memória (persistidos também no localStorage)
const BACKUP_KEY_TUDO    = 'garagespot_backup_tudo';

function fmtTs(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('pt-BR')+' às '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

window.confirmReset = function(){
  // 1ª confirmação
  showM(`<div class="mt">Apagar tudo</div>
    <div class="ms">Todos os carros nas vagas e na lista de passeio serão removidos.<br><br>Tem certeza?</div>
    <div class="ag">
      <button class="ab ac" id="r1-sim">Sim, apagar tudo</button>
      <button class="bcx" onclick="closeOv()" style="margin-top:4px">Cancelar</button>
    </div>`);
  document.getElementById('r1-sim').onclick=function(){
    showM(`<div class="mt">Confirmar</div>
      <div class="ms" style="color:#A32D2D;font-weight:600">Confirme uma segunda vez para apagar.</div>
      <div class="ag">
        <button class="ab ac" id="r2-sim">Confirmar — apagar agora</button>
        <button class="bcx" onclick="closeOv()" style="margin-top:4px">Cancelar</button>
      </div>`);
    document.getElementById('r2-sim').onclick=function(){ executarReset(); };
  };
};

function executarReset(){
  const ts = Date.now();
  const snap = buildSnapshot(); snap.ts = ts;
  try{ localStorage.setItem(BACKUP_KEY_TUDO, JSON.stringify(snap)); }catch(e){}

  // Apaga tudo
  Object.keys(S).forEach(id=>{
    S[id].status='free';S[id].apt='';S[id].model='';S[id].color='';
    S[id].plate='';S[id].guest='';S[id].obs='';S[id].size='small';
    S[id].mergedMaster=false;S[id].mergedSlave=false;S[id].hospedagem='';
    if(id.endsWith('B')){const td=getTd(id);if(td)td.rowSpan=1;}
    ref(id);
  });
  Object.keys(PASSEIO).forEach(k=>delete PASSEIO[k]);

  addLogSistema('Mapa limpo por usuário');
  upd(); saveData(); closeOv();
  atualizarBotoesRestore();
}

function atualizarBotoesRestore(){
  const rbtn = document.getElementById('reset-btns');
  if(!rbtn) return;
  // Remove botões restore antigos
  rbtn.querySelectorAll('.restore').forEach(b=>b.remove());
  // Adiciona restore se houver backup
  try{
    const bt = localStorage.getItem(BACKUP_KEY_TUDO);
    if(bt){
      const data = JSON.parse(bt);
      const b = document.createElement('button');
      b.className = 'rbtn restore';
      b.textContent = '↺';
      b.title = 'Restaurar — backup de '+fmtTs(data.ts);
      b.onclick = ()=>confirmRestore(data.ts);
      rbtn.appendChild(b);
    }
  }catch(e){}
}

window.confirmRestore = function(ts){
  showM(`<div class="mt">Restaurar</div>
    <div class="ms">Isso vai restaurar todas as vagas e passeio.<br><br>
    Backup de: <strong>${fmtTs(ts)}</strong><br><br>
    Confirma?</div>
    <div class="ag">
      <button class="ab" style="background:#EEF6FF;color:#185FA5" id="rs-sim">↺ Restaurar</button>
      <button class="bcx" onclick="closeOv()" style="margin-top:4px">Cancelar</button>
    </div>`);
  document.getElementById('rs-sim').onclick=function(){ executarRestore(); };
};

function executarRestore(){
  try{
    const raw = localStorage.getItem(BACKUP_KEY_TUDO);
    if(!raw){ closeOv(); return; }
    const data = JSON.parse(raw);
    Object.keys(S).forEach(id=>{
      S[id].status='free';S[id].apt='';S[id].model='';S[id].color='';
      S[id].plate='';S[id].guest='';S[id].obs='';S[id].size='small';
      S[id].mergedMaster=false;S[id].mergedSlave=false;
    });
    Object.keys(PASSEIO).forEach(k=>delete PASSEIO[k]);
    applySnapshot(data);
    Object.keys(S).forEach(id=>{
      ref(id);
      if(id.endsWith('B')){const td=getTd(id);if(td)td.rowSpan=S[id].mergedMaster?2:1;}
    });
    try{ localStorage.removeItem(BACKUP_KEY_TUDO); }catch(e){}
    const rbtn=document.getElementById('reset-btns');
    if(rbtn) rbtn.querySelectorAll('.restore').forEach(b=>b.remove());
    addLogSistema('Mapa restaurado do backup de '+fmtTs(data.ts));
    upd(); saveData(); closeOv();
  }catch(e){ closeOv(); }
}

function estaNoExpediente(u){
  if(!u||!u.horaInicio||!u.horaFim) return true;
  const now=new Date(); const nowMin=now.getHours()*60+now.getMinutes();
  const toMin=s=>{ const [h,m]=s.split(':').map(Number); return h*60+m; };
  const ini=toMin(u.horaInicio); const fim=toMin(u.horaFim);
  if(ini<=fim) return nowMin>=ini && nowMin<fim;
  return nowMin>=ini || nowMin<fim; // turno que passa da meia-noite
}

function confirmarUsuario(acao, callback){
  if(!USUARIOS.length){ callback(null); return; }
  const noExp=USUARIOS.filter(u=>estaNoExpediente(u)).sort((a,b)=>a.nome.localeCompare(b.nome));
  const foraExp=USUARIOS.filter(u=>!estaNoExpediente(u)).sort((a,b)=>a.nome.localeCompare(b.nome));
  const todosForaOuSemExp=noExp.length===0;

  function renderItemUsr(u){
    const fora=foraExp.includes(u);
    return `<div class="usr-item" id="cu-usr-${u.id}">
      <div>
        <div><span class="usr-nome">${u.nome}</span>${fora?'<span class="usr-badge-out">Fora do expediente</span>':''}</div>
        <div class="usr-cargo-lbl">${u.cargo}${!fora&&u.horaInicio?' · '+u.horaInicio+'–'+u.horaFim:''}</div>
      </div>
    </div>`;
  }

  function bindClicks(lista){
    lista.forEach(u=>{
      const el=document.getElementById('cu-usr-'+u.id);
      if(el) el.onclick=()=>mostrarConfirmacao(u);
    });
  }

  function mostrarLista(expandido){
    const itens=expandido||todosForaOuSemExp?[...noExp,...foraExp]:noExp;
    const listaHTML=itens.length>0?itens.map(renderItemUsr).join('')
      :'<span style="font-size:12px;color:#bbb;padding:8px 0;display:block">Nenhum usuário no expediente</span>';
    const verMaisHTML=!expandido&&!todosForaOuSemExp&&foraExp.length>0
      ?`<button onclick="window._cuExpandir()" style="background:none;border:1px solid #ddd;border-radius:5px;padding:5px 10px;font-size:11px;color:#888;cursor:pointer;font-family:inherit;width:100%;margin-top:4px">Ver mais (${foraExp.length})</button>`:'';

      <div class="usr-list">${listaHTML}</div>
      ${verMaisHTML}
      <button class="bcx" onclick="closeOv()" style="width:100%;margin-top:8px">Cancelar</button>`;
    document.getElementById('ov').classList.add('on');
    window._cuExpandir=()=>mostrarLista(true);
    bindClicks(itens);
  }

  function mostrarConfirmacao(u){
    const fora=foraExp.includes(u);
    const mc=document.getElementById('mc');
    const avisoFora=fora?`<div style="background:#FFF3E0;border:1px solid #E65100;border-radius:7px;padding:8px 12px;font-size:12px;color:#BF360C;margin-bottom:10px">⚠️ Fora do horário de expediente</div>`:'';
    mc.innerHTML=`<div class="mt">Confirma</div>
      <div style="background:#f5f4f0;border-radius:8px;padding:10px 12px;margin-bottom:12px">
        <div style="font-size:14px;font-weight:700;color:#111">${u.nome} · ${u.cargo}</div>
        ${u.horaInicio?'<div style="font-size:11px;color:#888;margin-top:3px">Expediente: '+u.horaInicio+'–'+u.horaFim+'</div>':''}
      </div>
      ${avisoFora}
      <div class="b2">
        <button class="bcx" id="cu-voltar">← Voltar</button>
        <button class="bsv" id="cu-ok">Confirmar</button>
      </div>`;
    document.getElementById('ov').classList.add('on');
    document.getElementById('cu-voltar').onclick=()=>mostrarLista(false);
    document.getElementById('cu-ok').onclick=()=>callback({nome:u.nome,cargo:u.cargo,foraExpediente:fora});
  }

  mostrarLista(false);
}

function getTurnoDoEvento(ts){
  const d=new Date(ts);
  const nowMin=d.getHours()*60+d.getMinutes();
  const toMin=s=>{ const [h,m]=s.split(':').map(Number); return h*60+m; };
  for(const t of TURNOS){
    const ini=toMin(t.inicio),fim=toMin(t.fim);
    if(ini<=fim){ if(nowMin>=ini && nowMin<fim) return t.nome; }
    else { if(nowMin>=ini || nowMin<fim) return t.nome; }
  }
  return '';
}

let _buscaTimeout=null;
function toggleBusca(){
  const bar=document.getElementById('busca-bar');
  const on=bar.classList.contains('on');
  bar.classList.toggle('on',!on);
  if(!on) setTimeout(()=>{ const i=document.getElementById('busca-input');if(i)i.focus(); },80);
  else fecharBusca();
}
function fecharBusca(){
  const bar=document.getElementById('busca-bar'); if(bar) bar.classList.remove('on');
  const inp=document.getElementById('busca-input'); if(inp) inp.value='';
  clearBuscaHighlight();
}
function clearBuscaHighlight(){
  document.querySelectorAll('.search-hit').forEach(el=>el.classList.remove('search-hit'));
}
function onBuscaInput(q){
  clearTimeout(_buscaTimeout);
  clearBuscaHighlight();
  if(!q||q.length<2) return;
  _buscaTimeout=setTimeout(()=>executarBusca(q),300);
}
function executarBusca(q){
  const ql=q.toLowerCase().trim();
  let hits=0;
  // Busca nas vagas ocupadas
  Object.entries(S).forEach(([id,d])=>{
    if(d.status!=='occupied') return;
    const campos=[d.apt,d.model,d.color,d.plate,d.guest,d.hospedagem].map(v=>(v||'').toLowerCase());
    if(campos.some(c=>c.includes(ql))){
      const td=getTd(id); if(td){ td.classList.add('search-hit'); hits++; }
    }
  });
  // Busca em carros a passeio (destaca na lista inline)
  Object.entries(PASSEIO).forEach(([apt,d])=>{
    const campos=[apt,d.model,d.color,d.plate,d.guest,d.hospedagem].map(v=>(v||'').toLowerCase());
    if(campos.some(c=>c.includes(ql))){
      const el=document.querySelector(`.tb-pi[title*="${apt}"]`);
      if(el) el.classList.add('search-hit');
    }
  });
  if(hits===0) showToast('Nenhuma vaga encontrada para "'+q+'"',2500);
}

const GESTAO_PIN_KEY='garagespot_gestao_pin';
const GESTAO_UNLOCK_MS=30*60*1000;
let _gestaoUnlockTs=0;

function isGestaoUnlocked(){ return Date.now()<_gestaoUnlockTs; }

function showGestaoMenu(){
  const pinSalvo=localStorage.getItem(GESTAO_PIN_KEY);

}

function _mostrarMenuGestao(){

    <button class="bcx" onclick="closeOv()" style="width:100%;margin-top:8px">Fechar</button>`;
  document.getElementById('ov').classList.add('on');

function showEntrarPIN(callback){
  let digitado='';
  const mc=document.getElementById('mc');
  function render(){
    mc.innerHTML=`<div class="mt">🔑 PIN de Gestão</div>
      <div class="ms">Digite o PIN de 4 dígitos</div>
      <div class="pin-display">${[0,1,2,3].map(i=>`<div class="pin-dot${i<digitado.length?' filled':''}" id="pd-${i}"></div>`).join('')}</div>
      <div id="pin-err" style="min-height:16px;text-align:center;font-size:11px;color:#A32D2D;margin-bottom:4px"></div>
      <div class="pin-keypad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinKey('${n}')">${n}</button>`).join('')}
        <button class="pin-key" onclick="closeOv()" style="font-size:11px;color:#888">✕</button>
        <button class="pin-key" onclick="pinKey('0')">0</button>
        <button class="pin-key del" onclick="pinDel()">⌫</button>
      </div>`;
    document.getElementById('ov').classList.add('on');
  }
  window.pinKey=function(d){
    if(digitado.length>=4) return;
    digitado+=d;
    for(let i=0;i<4;i++){
      const dot=document.getElementById('pd-'+i);
      if(dot) dot.classList.toggle('filled',i<digitado.length);
    }
    if(digitado.length===4){
      const salvo=localStorage.getItem(GESTAO_PIN_KEY);
      if(digitado===salvo){
        _gestaoUnlockTs=Date.now()+GESTAO_UNLOCK_MS;
        callback();
      } else {
        const err=document.getElementById('pin-err');
        if(err) err.textContent='PIN incorreto — tente novamente';
        digitado='';
        setTimeout(()=>{ for(let i=0;i<4;i++){const dot=document.getElementById('pd-'+i);if(dot)dot.classList.remove('filled');} },300);
      }
    }
  };
  window.pinDel=function(){
    if(!digitado.length) return;
    digitado=digitado.slice(0,-1);
    for(let i=0;i<4;i++){
      const dot=document.getElementById('pd-'+i);
      if(dot) dot.classList.toggle('filled',i<digitado.length);
    }
  };
  render();
}

function showCriarPIN(){
  let step=1, pin1='';
  const mc=document.getElementById('mc');
  function renderStep(){
    mc.innerHTML=`<div class="mt">🔑 Criar PIN de Gestão</div>
      <div class="ms">${step===1?'Escolha um PIN de 4 dígitos para proteger a área de gestão':'Confirme o PIN'}</div>
      <div class="pin-display">${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd-${i}"></div>`).join('')}</div>
      <div id="pin-err" style="min-height:16px;text-align:center;font-size:11px;color:#A32D2D;margin-bottom:4px"></div>
      <div class="pin-keypad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinKey('${n}')">${n}</button>`).join('')}
        <button class="pin-key" onclick="closeOv()" style="font-size:11px;color:#888">✕</button>
        <button class="pin-key" onclick="pinKey('0')">0</button>
        <button class="pin-key del" onclick="pinDel()">⌫</button>
      </div>`;
    document.getElementById('ov').classList.add('on');
    let digitado='';
    window.pinKey=function(d){
      if(digitado.length>=4) return;
      digitado+=d;
      for(let i=0;i<4;i++){
        const dot=document.getElementById('pd-'+i);
        if(dot) dot.classList.toggle('filled',i<digitado.length);
      }
      if(digitado.length===4){
        if(step===1){ pin1=digitado; step=2; setTimeout(renderStep,300); }
        else {
          if(digitado===pin1){
            localStorage.setItem(GESTAO_PIN_KEY,pin1);
            _gestaoUnlockTs=Date.now()+GESTAO_UNLOCK_MS;
            _mostrarMenuGestao();
          } else {
            const err=document.getElementById('pin-err');
            if(err) err.textContent='PINs não coincidem — tente novamente';
            digitado=''; step=1; pin1='';
            setTimeout(()=>{ for(let i=0;i<4;i++){const dot=document.getElementById('pd-'+i);if(dot)dot.classList.remove('filled');} },300);
          }
        }
      }
    };
    window.pinDel=function(){
      if(!digitado.length) return;
      digitado=digitado.slice(0,-1);
      for(let i=0;i<4;i++){
        const dot=document.getElementById('pd-'+i);
        if(dot) dot.classList.toggle('filled',i<digitado.length);
      }
    };
  }
  renderStep();
}

function trocarPIN(){
  showEntrarPIN(()=>{
    localStorage.removeItem(GESTAO_PIN_KEY);
    _gestaoUnlockTs=0;
    showCriarPIN();
  });
}

// ── HISTÓRICO DE EVENTOS ─────────────────────────────────────────────────
const HISTORICO = {};

function fmtDt(ts){
  if(!ts) return 'Não informado';
  const d=new Date(ts);
  return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function addHistorico(apt, tipo, vaga, extra, usuario, hospedagem){
  if(!apt) return;
  if(!HISTORICO[apt]) HISTORICO[apt]=[];
  HISTORICO[apt].push({tipo, ts:Date.now(), vaga:vaga||'', extra:extra||'',
    usuario:usuario||'', hospedagem:hospedagem||''});
  saveHistorico();
}

function saveHistorico(){
  try{ localStorage.setItem('garagespot_historico', JSON.stringify(HISTORICO)); }catch(e){}
}

function loadHistorico(){
  try{
    const raw=localStorage.getItem('garagespot_historico');
    if(raw){ const d=JSON.parse(raw); Object.assign(HISTORICO,d); }
  }catch(e){}
}

function iniciarHistorico(apt, vaga, hospedagem, usuario){
  HISTORICO[apt]=[{tipo:'checkin', ts:Date.now(), vaga:vaga, extra:'',
    usuario:usuario||'', hospedagem:hospedagem||''}];
  saveHistorico();
}

function getHistorico(apt){ return HISTORICO[apt]||[]; }

function aptJaFezCheckout(apt){
  return (HISTORICO[apt]||[]).some(e=>e.tipo==='checkout');
}

// ── GERAÇÃO DE REGISTRO (HTML→PDF) — 100% nativo, zero dependências ────────
// Funciona em browser, APK e offline. Gera HTML rico que o dispositivo
// converte para PDF via menu nativo (Imprimir → Salvar como PDF).

function fmtNomeArquivo(apt, guest, tsEntrada, tsSaida, hospNum){
  const limpa=s=>(s||'').replace(/[^a-zA-Z0-9À-ú]/g,'').trim().replace(/\s+/g,'_');
  const dtE=tsEntrada?new Date(tsEntrada).toLocaleDateString('pt-BR').replace(/\//g,'-'):'';
  const dtS=tsSaida?new Date(tsSaida).toLocaleDateString('pt-BR').replace(/\//g,'-'):'';
  const p=[];
  if(hospNum) p.push(hospNum); else p.push('GarageSpot');
  p.push('Apt'+apt);
  if(guest) p.push(limpa(guest));
  if(dtE) p.push(dtE);
  if(dtS && dtS!==dtE) p.push(dtS);
  return p.join('_');
}

// Detecta se está rodando dentro do APK (Capacitor)
function isCapacitor(){ return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()); }

async function compartilharPDF(apt,dv,hist,anexos){
  const hospNum=dv.hospedagem||((hist||[]).find(e=>e.tipo==='checkin')?.hospedagem)||'';
  const nomeArquivo=fmtNomeArquivo(apt,dv.guest,
    (hist||[]).find(e=>e.tipo==='checkin')?.ts,
    (hist||[]).slice().reverse().find(e=>e.tipo==='checkout')?.ts,
    hospNum);
  const html=buildRegistroHTML(apt,dv,hist,anexos);

  if(window.Capacitor && window.Capacitor.Plugins){
    const Filesystem = window.Capacitor.Plugins.Filesystem;
    const Share = window.Capacitor.Plugins.Share;
    if(Filesystem && Share){
      try{
        await Filesystem.writeFile({
          path: 'GarageSpot/'+nomeArquivo+'.html',
          data: html,
          directory: 'DOCUMENTS',
          encoding: 'utf8',
          recursive: true
        });
        const uriResult = await Filesystem.getUri({
          path: 'GarageSpot/'+nomeArquivo+'.html',
          directory: 'DOCUMENTS'
        });
        await Share.share({
          title: 'GarageSpot — Apt. '+apt,
          url: uriResult.uri,
          dialogTitle: 'Compartilhar registro'
        });
        return;
      }catch(e){ console.error('Share error:',e); }
    }
  }
  // Fallback browser
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.target='_blank';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),10000);
}

async function salvarPDF(apt,dv,hist,anexos){
  const hospNum=dv.hospedagem||((hist||[]).find(e=>e.tipo==='checkin')?.hospedagem)||'';
  const nome=fmtNomeArquivo(apt,dv.guest,
    (hist||[]).find(e=>e.tipo==='checkin')?.ts,
    (hist||[]).slice().reverse().find(e=>e.tipo==='checkout')?.ts,
    hospNum);
  await compartilharPDF(apt,dv,hist,anexos);
  return nome+'.html';
}

// ── ANEXOS ────────────────────────────────────────────────────────────────
// Armazena anexos por chave (id da vaga ou apt do passeio)
// Cada item: { name, type, data (base64), isImg }
const ANEXOS = {};
const MAX_ANEXOS = 20;

function getAnexoKey(id, fromPasseio){ return fromPasseio ? 'p_'+id : 'v_'+id; }

function getAnexos(id, fromPasseio){
  return ANEXOS[getAnexoKey(id, fromPasseio)] || [];
}

function autoRenameAnexo(id, fromPasseio, file){
  if(!file.type.startsWith('image/')) return file.name;
  const apt = fromPasseio ? id : (S[id]?.apt||'');
  const hospNum = fromPasseio ? (PASSEIO[id]?.hospedagem||'') : (S[id]?.hospedagem||'');
  if(!hospNum && !apt) return file.name;
  const ext = file.name.lastIndexOf('.')>=0 ? file.name.slice(file.name.lastIndexOf('.')) : '.jpg';
  const now = new Date();
  const d2 = n=>String(n).padStart(2,'0');
  const dateStr = `${d2(now.getDate())}-${d2(now.getMonth()+1)}-${String(now.getFullYear()).slice(2)}`;
  const timeStr = `${d2(now.getHours())}h${d2(now.getMinutes())}`;
  // Count existing images to make unique name
  const key = getAnexoKey(id, fromPasseio);
  const idx = ((ANEXOS[key]||[]).filter(a=>a.isImg).length)+1;
  const parts=[];
  if(hospNum) parts.push(hospNum);
  if(apt) parts.push('Apto'+apt);
  parts.push(dateStr+'_'+timeStr);
  if(idx>1) parts.push(String(idx));
  return parts.join('_')+ext;
}

function addAnexo(id, fromPasseio, file){
  return new Promise((resolve)=>{
    const key = getAnexoKey(id, fromPasseio);
    if(!ANEXOS[key]) ANEXOS[key]=[];
    if(ANEXOS[key].length >= MAX_ANEXOS){ resolve(false); return; }
    const reader = new FileReader();
    reader.onload = e=>{
      const nome = autoRenameAnexo(id, fromPasseio, file);
      ANEXOS[key].push({
        name: nome,
        type: file.type,
        data: e.target.result,
        isImg: file.type.startsWith('image/')
      });
      saveAnexos();
      // Registra no histórico
      const apt = fromPasseio ? id : (S[id]?.apt||'');
      const hospNum = fromPasseio ? (PASSEIO[id]?.hospedagem||'') : (S[id]?.hospedagem||'');
      if(apt) addHistorico(apt,'edicao',fromPasseio?'':id,`Foto adicionada: ${nome}`,'',hospNum);
      resolve(true);
    };
    reader.readAsDataURL(file);
  });
}

function removeAnexo(id, fromPasseio, idx){
  const key = getAnexoKey(id, fromPasseio);
  if(ANEXOS[key]){
    const nome = ANEXOS[key][idx]?.name||'';
    ANEXOS[key].splice(idx,1);
    saveAnexos();
    const apt = fromPasseio ? id : (S[id]?.apt||'');
    const hospNum = fromPasseio ? (PASSEIO[id]?.hospedagem||'') : (S[id]?.hospedagem||'');
    if(apt && nome) addHistorico(apt,'edicao',fromPasseio?'':id,`Foto removida: ${nome}`,'',hospNum);
  }
}

function saveAnexos(){
  try{ localStorage.setItem('garagespot_anexos', JSON.stringify(ANEXOS)); }catch(e){}
}

function loadAnexos(){

    const raw = localStorage.getItem('garagespot_anexos');
    if(raw){ const data=JSON.parse(raw); Object.assign(ANEXOS, data); }

}

const STORAGE_KEY = 'garagem_spot_v1';
const DB_NAME     = 'GaragemSpot';
const DB_STORE    = 'estado';
let   db          = null;

// Abre o banco IndexedDB
function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains(DB_STORE))
        d.createObjectStore(DB_STORE);
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = () => reject(req.error);
  });
}

// Monta o objeto de estado para salvar
function buildSnapshot(){
  const vagas = {};
  Object.entries(S).forEach(([id,d])=>{
    vagas[id] = {
      status:d.status, apt:d.apt, model:d.model, color:d.color,
      plate:d.plate, guest:d.guest, obs:d.obs||'', size:d.size,
      mergedMaster:d.mergedMaster, mergedSlave:d.mergedSlave,
      hmergeWith:d.hmergeWith||null, hospedagem:d.hospedagem||'',
    };
  });
  return { vagas, passeio: JSON.parse(JSON.stringify(PASSEIO)), ts: Date.now() };
}

// Restaura o estado a partir de um snapshot
function applySnapshot(data){
  if(!data || !data.vagas) return false;
  Object.entries(data.vagas).forEach(([id, saved])=>{
    if(!S[id]) return;
    S[id].status       = saved.status       || 'free';
    S[id].apt          = saved.apt          || '';
    S[id].model        = saved.model        || '';
    S[id].color        = saved.color        || '';
    S[id].plate        = saved.plate        || '';
    S[id].guest        = saved.guest        || '';
    S[id].obs          = saved.obs          || '';
    S[id].size         = saved.size         || 'small';
    S[id].mergedMaster = saved.mergedMaster || false;
    S[id].mergedSlave  = saved.mergedSlave  || false;
    S[id].hmergeWith   = saved.hmergeWith   || null;
    S[id].hospedagem   = saved.hospedagem   || '';
  });
  if(data.passeio){
    Object.entries(data.passeio).forEach(([apt,d])=>{
      PASSEIO[apt] = {
        model:d.model||'', color:d.color||'', plate:d.plate||'',
        guest:d.guest||'', obs:d.obs||'', lastVaga:d.lastVaga||'',
        size:d.size||'small',
      };
    });
  }
  return true;
}

// Salva no IndexedDB (assíncrono, não bloqueia UI)
function saveData(){
  const snap = buildSnapshot();
  // Tenta IndexedDB primeiro
  if(db){
    try {
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(snap, STORAGE_KEY);
    } catch(e){ /* silencia erros de escrita */ }
  }
  // Salva também no localStorage como backup
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(snap)); } catch(e){}
}

// Carrega do IndexedDB; se falhar, tenta localStorage
function loadData(){
  return new Promise(resolve=>{
    // Tenta IndexedDB
    if(db){
      try {
        const tx  = db.transaction(DB_STORE, 'readonly');
        const req = tx.objectStore(DB_STORE).get(STORAGE_KEY);
        req.onsuccess = ()=>{
          if(req.result){ resolve(applySnapshot(req.result)); return; }
          // Não tinha no IDB — tenta localStorage
          resolve(loadFromLocalStorage());
        };
        req.onerror = ()=> resolve(loadFromLocalStorage());
        return;
      } catch(e){}
    }
    resolve(loadFromLocalStorage());
  });
}

function loadFromLocalStorage(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    return applySnapshot(JSON.parse(raw));
  } catch(e){ return false; }
}

const _upd = upd;
upd = function(){
  _upd();
  saveData();
};

const LICENSE_URL = 'https://gist.githubusercontent.com/ApolloDSk/a9b3a7937b71c3e0956f236dcfd3b6d8/raw/license.json';
// Cache de 5 minutos — verifica com frequência mas não a cada clique
const LICENSE_CACHE_MS  = 5 * 60 * 1000;
const LICENSE_CACHE_KEY = 'garagespot_license_cache';

function showLicenseBlocked(semInternet){
  document.body.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                height:100vh;background:#f0efea;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;

      </div>
      <div style="font-size:14px;color:#888;max-width:280px;line-height:1.6">
        ${semInternet
          ? 'Não foi possível verificar a licença.<br>Verifique sua conexão com a internet.'
          : 'Este aplicativo não está autorizado a funcionar neste momento.<br><br>Entre em contato com o administrador.'}
      </div>
      ${semInternet?`
      <button onclick="location.reload()" style="margin-top:24px;background:#185FA5;color:#fff;
        border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;
        cursor:pointer;font-family:inherit">Tentar novamente</button>`:''}

    </div>`;
}

async function checkLicense(){
  // Verifica cache local primeiro
  try{
    const cached = localStorage.getItem(LICENSE_CACHE_KEY);
    if(cached){
      const {ativo, ts} = JSON.parse(cached);
      if((Date.now() - ts) < LICENSE_CACHE_MS){
        return ativo;
      }
    }
  }catch(e){}

  // Consulta o servidor
  try{
    const res = await fetch(LICENSE_URL, {
      method: 'GET',
      cache: 'no-store',
      signal: AbortSignal.timeout(6000)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    // Gist retorna JSON direto: {"ativo": true}
    // JSONBin retornava: {"record": {"ativo": true}}
    const json = await res.json();
    const ativo = json?.ativo === true || json?.record?.ativo === true;

    try{ localStorage.setItem(LICENSE_CACHE_KEY, JSON.stringify({ativo, ts:Date.now()})); }catch(e){}
    return ativo;

  }catch(e){
    // Erro de rede — usa cache mesmo expirado se houver
    try{
      const cached = localStorage.getItem(LICENSE_CACHE_KEY);
      if(cached){
        const {ativo, ts} = JSON.parse(cached);
        // Cache de até 24h aceito em modo offline
        if((Date.now() - ts) < 24 * 60 * 60 * 1000){
          return ativo;
        }
      }
    }catch(e2){}
    // Sem cache nenhum e sem internet → bloqueia por segurança
    return false;
  }
}

// Inicialização — verifica licença antes de carregar o app
initState();
checkLicense().then(async (ativo)=>{
  if(!ativo){
    showLicenseBlocked(false);
    return;
  }
  // Licença OK — inicializa normalmente
  openDB()
    .catch(()=>{ db=null; })
    .finally(async ()=>{
      const restored = await loadData();
      loadAnexos();
      loadHistorico();
      loadUsuarios();
      loadHospedagens();
      loadTurnos();
      buildTable();
      if(restored) Object.keys(S).forEach(id=>ref(id));
      attachDrag();
      upd(); tick(); setInterval(tick,15000);
      requestAnimationFrame(()=>setTimeout(positionPilares, 50));
    });
});
